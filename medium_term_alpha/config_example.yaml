data:
  csv: Results/sample_prices.csv
  benchmark: SPY
  start: 2018-01-01
  end:

strategy:
  top_quantile: 0.25
  gross_exposure: 1.0
  cost_bps: 5.0
  momentum_skip_recent_days: 5
  min_signal_strength: 0.85
  signal_change_threshold: 0.05
  max_position_size: 0.06
  negative_trend_scale: 0.40
  high_volatility_scale: 0.40
  multi_momentum_weight: 0.55
  mean_reversion_weight: 0.25
  quality_weight: 0.20
  short_term_reversal_penalty: 0.15

validation:
  train_years: 3
  run_sharpe_research: false

output:
  results_dir: Results
  plots_dir: Plots
